name: wipac ci/cd

on:
  # only on branch pushes
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # don't cancel on main/master/default
  cancel-in-progress: ${{ format('refs/heads/{0}', github.event.repository.default_branch) != github.ref }}

env:
  CI_DOCKER_IMAGE_W_TAG: ray/test:local


jobs:

  py-versions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.versions.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}  # lock to triggered commit (github.ref is dynamic)
      - id: versions
        uses: WIPACrepo/wipac-dev-py-versions-action@v2.8


  #############################################################################
  # LINTERS
  #############################################################################

  lint:
    needs: [ py-versions ]
    uses: WIPACrepo/wipac-dev-workflows/.github/workflows/lint-python.yml@v1.24
    with:
      py-matrix-json: ${{ needs.py-versions.outputs.matrix }}
      max-complexity: 11  # ideal is ~10-15


  #############################################################################
  # PACKAGING
  #############################################################################

  py-setup:
    if: ${{ github.actor != 'dependabot[bot]' }} # dependabot cannot access PAT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          ref: ${{ github.ref }}  # dont lock to sha (action needs to push)
      - uses: WIPACrepo/wipac-dev-py-setup-action@v5.12
        with:
          mode: PACKAGING
          python_min: 3.14
          auto_mypy_option: True

  py-dependencies:
    needs: [ lint ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}  # lock to triggered commit (github.ref is dynamic)
          fetch-depth: 0  # setuptools-scm needs to access git tags

      # 1: ask the action if it would proceed before building our expensive images
      - uses: WIPACrepo/wipac-dev-py-dependencies-action@v3.4
        id: pydep-precheck
        with:
          only_precheck: true
      # 2: pre-check passed, so proceed...
      - if: ${{ steps.pydep-precheck.outputs.do_generation == 'true' }}
        uses: docker/setup-buildx-action@v3
      - if: ${{ steps.pydep-precheck.outputs.do_generation == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: ray:py-dep-this
          load: true
      - if: ${{ steps.pydep-precheck.outputs.do_generation == 'true' }}
        uses: WIPACrepo/wipac-dev-py-dependencies-action@v3.4


  ############################################################################
  # TESTS
  #############################################################################

  test-build-docker:
    needs: [ lint ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}  # lock to triggered commit (github.ref is dynamic)
          fetch-depth: 0  # setuptools-scm needs to access git tags
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=min
          file: Dockerfile
          tags: ${{ env.CI_DOCKER_IMAGE_W_TAG }}

  # TODO: add tests?

  #############################################################################
  # GIT TAG & GITHUB RELEASE
  #############################################################################

  tag-and-release:
    # only run on main/default branch
    if: format('refs/heads/{0}', github.event.repository.default_branch) == github.ref
    needs: [
      py-versions,
      lint,
      py-setup,
      py-dependencies,
      test-build-docker,
    ]
    uses: WIPACrepo/wipac-dev-workflows/.github/workflows/tag-and-release.yml@v1.24
    permissions: # for GITHUB_TOKEN
      contents: write
    with:
      project-type: python
      python-version: "${{ fromJSON(needs.py-versions.outputs.matrix)[0] }}"
      release-artifacts: |
        py-dependencies-logs
    secrets:
      TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}  # trigger tag-event gha workflows
