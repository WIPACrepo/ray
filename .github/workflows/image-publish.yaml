name: harbor release

on:
  # only on tag pushes
  push:
    branches-ignore:
      - '**'
    tags:
      - '**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'the tag to publish and possibly overwrite'
        default: 'dev'
        required: false

jobs:
  image-publish:
    uses: WIPACrepo/wipac-dev-workflows/.github/workflows/image-publish.yml@v1.24
    permissions: # for GITHUB_TOKEN
      packages: write
    with:
      image_registry: harbor.icecube.aq
      image_namespace: wipac
      image_name: i3_ray_serve
      mode: 'BUILD'
      build_platforms_csv: linux/amd64
    secrets:
      registry_username: ${{ secrets.HARBOR_USERNAME }}
      registry_token: ${{ secrets.HARBOR_TOKEN }}
